spring.application.name=VK_monetisation

spring.datasource.url=${URL}
spring.datasource.username=${USERNAME}
spring.datasource.password=${PSQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.docker.compose.enabled=false

server.port=8080

app.tx.campaign-activation-duration-minutes=4
app.tx.simulate-ledger-failure=false
app.tx.ledger.jndi-name=java:/jdbc/VkMonetisationLedgerXA

# --- Lab 3: RabbitMQ / STOMP / JMS ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

app.messaging.stomp.broker-url=${STOMP_BROKER_URL:ws://localhost:15674/ws}
app.messaging.stomp.login=${RABBITMQ_USER:guest}
app.messaging.stomp.passcode=${RABBITMQ_PASSWORD:guest}
app.messaging.queue.compliance=vk.campaign.compliance
app.messaging.queue.notifications=vk.campaign.notifications

# Узел кластера: на node-1 включите compliance, на node-2 — notifications
app.cluster.node-id=${CLUSTER_NODE_ID:node-1}
app.cluster.compliance-listener.enabled=${COMPLIANCE_LISTENER:true}
app.cluster.notification-listener.enabled=${NOTIFICATION_LISTENER:true}

# --- Lab 3: планировщик статистики контента ---
app.scheduler.engagement.enabled=true
app.scheduler.engagement.fixed-rate-ms=60000

# --- Lab 3: EIS (российские сервисы) через JCA ---
app.eis.stub-mode=${EIS_STUB_MODE:true}
app.eis.dadata.api-url=https://suggestions.dadata.ru/suggestions/api/4_1/rs/findById/party
app.eis.dadata.token=${DADATA_TOKEN:}
app.eis.smsru.api-url=https://sms.ru/sms/send
app.eis.smsru.api-id=${SMSRU_API_ID:}
